<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avalon · Night Phase</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: #000000; min-height: 100vh; }

    .avalon-root {
      min-height: 100vh;
      background: #000000;
      color: #fff8e8;
      font-family: 'Crimson Pro', Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.75rem 1rem 1.5rem;
      position: relative;
      overflow: hidden;
    }



    .sigil { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.85; letter-spacing: 0.3em; color: #ffd84a; text-shadow: 0 0 20px rgba(232,184,75,0.5); }

    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2rem, 7vw, 3.6rem);
      font-weight: 700;
      color: #ffd84a;
      text-shadow: 0 0 20px rgba(245,200,66,0.7), 0 2px 6px rgba(0,0,0,0.9);
      text-align: center;
      margin-bottom: 0.15rem;
    }


    .divider {
      width: 300px; height: 2px; margin-bottom: 0.6rem;
      background: linear-gradient(90deg, transparent, #e02535, #e8b84b, #e02535, transparent);
      margin: 0 auto 2rem;
      position: relative;
    }

    .screen { width: 100%; display: flex; flex-direction: column; align-items: center; }
    .screen.hidden { display: none; }

    .screen-label {
      font-size: 0.8rem; color: #c8a84a;
      margin-bottom: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase;
    }

    /* PLAYER COUNT */
    .player-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1rem; max-width: 360px; width: 100%; margin-bottom: 0.6rem;
    }

    .player-btn {
      background: linear-gradient(160deg, rgba(220,28,42,0.25), rgba(20,70,110,0.25));
      border: 1px solid rgba(255,216,74,0.5);
      color: #ffd84a; font-family: 'Cinzel Decorative', serif;
      padding: 0.7rem; border-radius: 6px; cursor: pointer; transition: all 0.2s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .player-btn:hover {
      background: linear-gradient(160deg, rgba(220,28,42,0.5), rgba(20,70,110,0.45));
      border-color: #ffd84a;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(220,28,42,0.4), 0 0 15px rgba(232,184,75,0.2);
    }

    .player-btn .pcount { display: block; font-size: 1.5rem; }
    .player-btn .plabel { display: block; font-family: 'Crimson Pro', serif; font-size: 0.7rem; letter-spacing: 0.15em; opacity: 0.7; margin-top: 2px; }

    /* VOICE PICKER */
    .voice-grid { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.5rem; }

    .voice-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.85rem 1rem; border-radius: 6px;
      border: 1px solid rgba(232,184,75,0.15);
      background: #281418;
      cursor: pointer; transition: all 0.2s; user-select: none;
    }

    .voice-row:hover { background: #3a1e28; border-color: rgba(232,184,75,0.4); }

    .voice-row.selected {
      background: linear-gradient(135deg, rgba(220,28,42,0.35), rgba(20,70,110,0.3));
      border-color: #ffd84a;
      box-shadow: 0 0 15px rgba(232,184,75,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .voice-radio {
      width: 16px; height: 16px; border-radius: 50%;
      border: 1.5px solid rgba(232,184,75,0.4);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.15s;
    }

    .voice-row.selected .voice-radio { border-color: #ffd84a; background: #3a3010; }

    .voice-radio-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #e8b84b; opacity: 0; transition: opacity 0.15s;
    }

    .voice-row.selected .voice-radio-dot { opacity: 1; }

    .voice-info { flex: 1; }
    .voice-name { font-family: 'Cinzel Decorative', serif; font-size: 0.82rem; color: #fff8e8; margin-bottom: 2px; font-weight: 700; }
    .voice-desc { display: none; }
    .voice-emoji { font-size: 1.4rem; }

    .preview-btn {
      background: #1a2e48;
      border: 1px solid rgba(60,140,185,0.5);
      color: #5ab4d4; font-size: 0.75rem; font-family: 'Crimson Pro', serif;
      padding: 0.35rem 0.75rem; border-radius: 3px; cursor: pointer;
      white-space: nowrap; transition: all 0.15s; letter-spacing: 0.05em;
    }

    .preview-btn:hover { background: #1a3060; border-color: rgba(60,140,185,0.75); }
    .preview-btn.playing { color: #ffcc44; border-color: rgba(255,204,68,0.5); background: #3e2028; }

    /* CARD SELECTION */
    .card-section { width: 100%; max-width: 500px; margin-bottom: 1.5rem; }
    .section-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .section-title { font-family: 'Cinzel Decorative', serif; font-size: 0.85rem; letter-spacing: 0.12em; }
    .good-title { color: #5ab4d4; text-shadow: 0 0 10px rgba(74,159,200,0.45); }
    .evil-title { color: #f03040; text-shadow: 0 0 10px rgba(232,64,64,0.4); }
    .section-count { font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 20px; letter-spacing: 0.1em; }
    .good-count { background: #162030; color: #5ab4d4; border: 1px solid rgba(74,159,200,0.35); }
    .evil-count { background: #281414; color: #f03040; border: 1px solid rgba(232,64,64,0.3); }

    .role-card {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.7rem 1rem; margin-bottom: 0.4rem;
      border-radius: 5px; border: 1px solid transparent;
      transition: all 0.2s; cursor: pointer; user-select: none;
    }

    .role-card.good { background: #14243a; border-color: rgba(74,159,200,0.12); }
    .role-card.evil { background: #2d1820; border-color: rgba(232,64,64,0.1); }
    .role-card.good.active { background: #1e2e42; border-color: rgba(110,207,238,0.8); box-shadow: 0 0 8px rgba(74,159,200,0.12); }
    .role-card.evil.active { background: #401e26; border-color: rgba(232,64,64,0.45); box-shadow: 0 0 8px rgba(232,64,64,0.12); }
    .role-card.locked { opacity: 0.65; cursor: default; }

    .role-checkbox {
      width: 18px; height: 18px; border-radius: 3px; border: 1.5px solid;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 11px; transition: all 0.15s;
    }

    .good .role-checkbox { border-color: rgba(74,159,200,0.4); color: #5ab4d4; }
    .evil .role-checkbox { border-color: rgba(232,64,64,0.35); color: #f03040; }
    .good.active .role-checkbox { border-color: #5ab4d4; background: #1a2a3a; }
    .evil.active .role-checkbox { border-color: #f03040; background: #301818; }

    .role-info { flex: 1; }
    .role-name { font-family: 'Cinzel Decorative', serif; font-size: 0.8rem; color: #fff8e8; font-weight: 700; }
    .role-desc { font-size: 0.75rem; color: #c8a84a; font-style: italic; margin-top: 1px; }

    .role-tag { font-size: 0.65rem; letter-spacing: 0.1em; padding: 1px 5px; border-radius: 3px; white-space: nowrap; }
    .tag-required { background: #2e2608; color: #ffd84a; border: 1px solid rgba(255,216,74,0.5); }
    .tag-auto { background: #222226; color: #aaa; }

    .ratio-bar {
      max-width: 500px; width: 100%; margin-bottom: 0.75rem;
      padding: 0.75rem 1rem;
      background: #1e1a14; border: 1px solid rgba(255,216,74,0.5);
      border-radius: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem;
    }

    .ratio-ok { color: #5dbb8a; font-weight: bold; }
    .ratio-bad { color: #f03040; }

    /* BUTTONS */
    .btn-primary {
      background: linear-gradient(135deg, #d42030, #f03040, #e8b84b, #f03040, #d42030);
      background-size: 300% 300%; border: 1px solid rgba(232,184,75,0.5); color: #fff8e8;
      font-family: 'Cinzel Decorative', serif; font-size: 0.85rem;
      padding: 0.9rem 2.5rem; border-radius: 4px; cursor: pointer;
      letter-spacing: 0.1em; transition: all 0.3s; animation: shimmer 4s ease infinite;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    @keyframes shimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(220,28,42,0.6), 0 0 15px rgba(232,184,75,0.3);
    }
    .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; animation: none; }

    .btn-ghost {
      background: #1a2e48; border: 1px solid rgba(92,184,255,0.25);
      color: #5ab4d4; font-family: 'Crimson Pro', serif; font-size: 0.85rem;
      padding: 0.6rem 1.5rem; border-radius: 4px; cursor: pointer;
      letter-spacing: 0.1em; transition: all 0.2s; margin-top: 0.4rem;
    }

    .btn-ghost:hover { color: #8dd0e8; border-color: rgba(74,159,200,0.55); background: #1e3452; }

    /* NIGHT PHASE */
    .night-screen { width: 100%; max-width: 520px; text-align: center; display: flex; flex-direction: column; align-items: center; }
    .step-indicator { display: flex; gap: 0.4rem; justify-content: center; margin-bottom: 2rem; }

    .step-dot { width: 6px; height: 6px; border-radius: 50%; background: #3a3010; transition: all 0.3s; }
    .step-dot.done { background: #5a1420; box-shadow: 0 0 4px rgba(220,28,42,0.5); }
    .step-dot.current { background: #ffd84a; box-shadow: 0 0 14px rgba(255,216,74,1.0); width: 22px; border-radius: 3px; }

    .narration-box {
      background: linear-gradient(160deg, rgba(220,28,42,0.15), rgba(30,50,130,0.12));
      border: 2px solid rgba(255,216,74,0.7);
      border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem;
      min-height: 160px; width: 100%;
      display: flex; align-items: center; justify-content: center; position: relative;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 4px 20px rgba(0,0,0,0.4);
    }

    .narration-text { font-weight: 500;
      font-size: clamp(1rem, 2.5vw, 1.25rem); line-height: 1.8;
      font-style: italic; color: #fff8e8; text-align: center;
      animation: fadeIn 0.6s ease forwards;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .speaking-indicator { position: absolute; bottom: 0.75rem; right: 0.75rem; display: flex; gap: 3px; align-items: flex-end; }
    .speaking-bar { width: 3px; background: #e8b84b; border-radius: 2px; opacity: 0; }
    .speaking-indicator.active .speaking-bar { animation: speakPulse 0.8s ease-in-out infinite alternate; opacity: 0.8; }
    .speaking-bar:nth-child(1){height:6px;animation-delay:0s}
    .speaking-bar:nth-child(2){height:12px;animation-delay:.15s}
    .speaking-bar:nth-child(3){height:8px;animation-delay:.3s}
    .speaking-bar:nth-child(4){height:14px;animation-delay:.1s}
    .speaking-bar:nth-child(5){height:6px;animation-delay:.25s}
    @keyframes speakPulse{from{transform:scaleY(.4)}to{transform:scaleY(1)}}

    .step-label { font-family:'Cinzel Decorative',serif; font-size:0.7rem; color:#c8a84a; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:0.4rem; }

    .timer-bar-wrap { width:100%; height:3px; background:#2a2408; border-radius:2px; margin-bottom:1rem; overflow:hidden; }
    .timer-bar { height:100%; background:linear-gradient(90deg,#e02535,#e8b84b,#1e608a); border-radius:2px; transition:width 0.1s linear; }

    .btn-row { display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap; }
    .voice-error { font-size:0.75rem; color:#ff9f5a; margin-bottom:0.4rem; font-style:italic; }

    /* DONE */
    .done-screen { text-align:center; animation:fadeIn 0.8s ease forwards; display:flex; flex-direction:column; align-items:center; padding-top:4rem; }
    .done-icon  { font-size:3.5rem; margin-bottom:1rem; filter: drop-shadow(0 0 12px rgba(232,184,75,0.6)); }
    .done-title { font-family:'Cinzel Decorative',serif; font-size:1.8rem; color:#ffd84a; margin-bottom:0.5rem; text-shadow: 0 0 30px rgba(255,216,74,0.7), 0 0 60px rgba(255,216,74,0.3); }
    .done-sub   { font-size:0.9rem; color:#c8a84a; font-style:italic; margin-bottom:2rem; }
  </style>
</head>

  {id:"vampire",  type:"browser", emoji:"🧛", name:"The Vampire",   desc:"Deep & dark · Browser",    rate:0.92, pitch:0.45, hints:["google uk english male","daniel","george","david"]},
  {id:"sorcerer", type:"browser", emoji:"🧙", name:"The Sorcerer",  desc:"Mysterious · Browser",     rate:0.85, pitch:0.55, hints:["google uk english male","daniel","george","david"]},
  {id:"demon",    type:"browser", emoji:"😈", name:"The Demon",     desc:"Low & menacing · Browser", rate:0.80, pitch:0.25, hints:["google uk english male","david","daniel","george"]},
];

const PREVIEW_TEXT = "Minions of Mordred... open your eyes. Look around. Know your allies in darkness.";

let playerCount = 0;
let selected = new Set();
let script = [];
let stepIdx = 0;
let timerRAF = null;
let synth = window.speechSynthesis;
let selectedVoiceId = "herald";
let allVoices = [];

function loadVoices() { allVoices = synth ? synth.getVoices() : []; }

function getBestVoice(preset) {
  for (const hint of preset.hints) {
    const v = allVoices.find(v => v.name.toLowerCase().includes(hint) && /en/i.test(v.lang));
    if (v) return v;
  }
  return allVoices.find(v => /en/i.test(v.lang)) || null;
}

function showScreen(id) {
  ["players","voice","cards","night","done"].forEach(s =>
    document.getElementById("screen-"+s).classList.toggle("hidden", s !== id)
  );
}

// ── PLAYERS ──────────────────────────────────────────────────────────
function choosePlayers(n) {
  playerCount = n;
  const ratio = RATIOS[n];
  selected = new Set(["merlin","assassin"]);
  let gn = ratio.g - 1, en = ratio.e - 1;
  for (let i = 1; i <= 5 && gn > 0; i++) { selected.add("loyal"+i); gn--; }
  for (let i = 1; i <= 3 && en > 0; i++) { selected.add("minion"+i); en--; }
  if (n === 5) {
    selected.delete("loyal1");
    selected.add("percival");
    selected.delete("minion1");
    selected.add("morgana");
  }
  loadVoices();
  renderVoicePicker();
  showScreen("voice");
}

// ── VOICE PICKER ──────────────────────────────────────────────────────
function renderVoicePicker() {
  const grid = document.getElementById("voice-grid");
  grid.innerHTML = "";
  VOICE_PRESETS.forEach(preset => grid.appendChild(makeVoiceRow(preset)));
}

function makeVoiceRow(preset) {
  const row = document.createElement("div");
  row.className = "voice-row" + (preset.id === selectedVoiceId ? " selected" : "");
  row.id = "vrow-" + preset.id;
  row.onclick = () => selectVoice(preset.id);
  row.innerHTML = `
    <div class="voice-radio"><div class="voice-radio-dot"></div></div>
    <div class="voice-emoji">${preset.emoji}</div>
    <div class="voice-info">
      <div class="voice-name">${preset.name}</div>
      <div class="voice-desc">${preset.desc}</div>
    </div>
    <button class="preview-btn" id="pbtn-${preset.id}"
      onclick="event.stopPropagation();previewVoice('${preset.id}')">▶ Preview</button>
  `;
  return row;
}

function selectVoice(id) {
  selectedVoiceId = id;
  document.querySelectorAll(".voice-row").forEach(r => r.classList.remove("selected"));
  document.getElementById("vrow-" + id).classList.add("selected");
}

let currentAudio = null;

function stopAll() {
  synth && synth.cancel();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.querySelectorAll(".preview-btn").forEach(b => { b.textContent = "▶ Preview"; b.classList.remove("playing"); });
}

function previewVoice(id) {
  const preset = VOICE_PRESETS.find(p => p.id === id);
  if (!preset) return;
  stopAll();
  selectVoice(id);
  const btn = document.getElementById("pbtn-" + id);
  btn.textContent = "■ Stop"; btn.classList.add("playing");
  const done = () => { btn.textContent = "▶ Preview"; btn.classList.remove("playing"); };

  if (true) {
    if (!synth) return;
    const utt = new SpeechSynthesisUtterance(PREVIEW_TEXT);
    utt.rate = preset.rate; utt.pitch = preset.pitch; utt.volume = 1;
    const v = getBestVoice(preset);
    if (v) utt.voice = v;
    utt.onend = utt.onerror = done;
    synth.speak(utt);
  }
}

function goToCards() {
  stopAll();
  document.getElementById("cards-label").textContent = `${playerCount} players · Choose your cards`;
  renderCards();
  showScreen("cards");
}

// ── CARDS ─────────────────────────────────────────────────────────────
function renderCards() {
  renderRoleList("good-roles-list", GOOD_ROLES, "good");
  renderRoleList("evil-roles-list", EVIL_ROLES, "evil");
  updateCounts();
}

function renderRoleList(cid, roles, side) {
  const c = document.getElementById(cid);
  c.innerHTML = "";
  roles.forEach(role => {
    if (role.generic && !selected.has(role.id)) return;
    const active = selected.has(role.id);
    const locked = role.required || role.generic;
    const div = document.createElement("div");
    div.className = `role-card ${side}${active?" active":""}${locked?" locked":""}`;
    if (!locked) div.onclick = () => toggleRole(role);
    div.innerHTML = `
      <div class="role-checkbox">${active?"✓":""}</div>
      <div class="role-info">
        <div class="role-name">${role.name}</div>
        ${role.desc?`<div class="role-desc">${role.desc}</div>`:""}
      </div>
      ${role.required?'<span class="role-tag tag-required">required</span>':role.generic?'<span class="role-tag tag-auto">auto</span>':""}
    `;
    c.appendChild(div);
  });
}

function toggleRole(role) {
  const isGood = GOOD_ROLES.find(r => r.id === role.id);
  const pool = isGood ? GOOD_ROLES : EVIL_ROLES;
  const ratio = RATIOS[playerCount];
  const maxCount = isGood ? ratio.g : ratio.e;

  if (selected.has(role.id)) {
    // Removing named role — replace with a generic to keep count stable
    selected.delete(role.id);
    const g = pool.find(r => r.generic && !selected.has(r.id));
    if (g) selected.add(g.id);
  } else {
    // Adding named role — only proceed if we can swap out a generic
    const g = [...pool].reverse().find(r => r.generic && selected.has(r.id));
    if (g) {
      selected.delete(g.id);
      selected.add(role.id);
    } else {
      // No generic to swap — only add if under the limit
      const currentCount = pool.filter(r => selected.has(r.id)).length;
      if (currentCount < maxCount) selected.add(role.id);
    }
  }
  renderCards();
}

function updateCounts() {
  const ratio = RATIOS[playerCount];
  const g = GOOD_ROLES.filter(r => selected.has(r.id)).length;
  const e = EVIL_ROLES.filter(r => selected.has(r.id)).length;
  const ok = g === ratio.g && e === ratio.e;
  document.getElementById("good-count-badge").textContent = `${g} / ${ratio.g}`;
  document.getElementById("evil-count-badge").textContent = `${e} / ${ratio.e}`;
  document.getElementById("ratio-good").textContent = g;
  document.getElementById("ratio-evil").textContent = e;
  document.getElementById("ratio-good-max").textContent = ratio.g;
  document.getElementById("ratio-evil-max").textContent = ratio.e;
  const s = document.getElementById("ratio-status");
  s.textContent = ok ? "✓ Balanced" : "⚠ Adjust roles";
  s.className = ok ? "ratio-ok" : "ratio-bad";
  document.getElementById("begin-btn").disabled = !ok;
}

// ── SCRIPT ────────────────────────────────────────────────────────────
function buildScript() {
  const hasOberon=selected.has("oberon"), hasMordred=selected.has("mordred"),
        hasMorgana=selected.has("morgana"), hasPercival=selected.has("percival");
  const s = [];
  s.push({id:"start", text:"Everybody close your eyes. Extend your fist in front of you.", pause:3000});
  const oberonWarning = hasOberon ? {id:"oberon_warning", text:"Oberon, keep your eyes closed throughout, and do not raise your thumb.", pause:2500} : null;
  if (oberonWarning) s.push(oberonWarning);
  s.push({id:"minions_open", text:"Agents of evil, open your eyes. Look around. Know your fellow agents of evil.", pause:4000});
  s.push({id:"minions_close_look", text:"Now close your eyes.", pause:2500});
  const mordredThumb = hasMordred ? " Mordred, keep your thumb down." : "";
  s.push({id:"minions_thumb", text:`Agents of evil, raise your thumbs so that Merlin may identify you.${mordredThumb}`, pause:3000});
  s.push({id:"merlin_open", text:`Merlin. Open your eyes, and behold the agents of evil.`, pause:5000});
  s.push({id:"merlin_close", text:"Agents of evil, lower your thumbs. Merlin, close your eyes.", pause:3000});
  if (hasPercival) {
    const r = hasMorgana?"Merlin and Morgana":"Merlin";
    const n = hasMorgana?"One is Merlin. One is Morgana. Choose wisely.":"There is Merlin.";
    s.push({id:"percival_thumbs", text:`${r}... raise your thumb. Percival must find you.`, pause:3000});
    s.push({id:"percival_open",   text:`Percival. Open your eyes. ${n}`, pause:5000});
    s.push({id:"percival_close",  text:`Percival, close your eyes. ${r}, lower your thumb.`, pause:3000});
  }
  s.push({id:"wake", text:"Everybody open your eyes. The quest begins. May the worthy prevail.", pause:0});
  return s;
}

// ── NIGHT ─────────────────────────────────────────────────────────────
function startNight() {
  script = buildScript(); stepIdx = 0;
  showScreen("night"); renderDots(); speakStep(0);
}

function renderDots() {
  const c = document.getElementById("step-dots");
  c.innerHTML = "";
  script.forEach((_,i) => {
    const d = document.createElement("div");
    d.className = "step-dot"+(i<stepIdx?" done":i===stepIdx?" current":"");
    c.appendChild(d);
  });
}

function updateDots() {
  document.querySelectorAll(".step-dot").forEach((d,i) => {
    d.className = "step-dot"+(i<stepIdx?" done":i===stepIdx?" current":"");
  });
}

function afterSpoken(step, idx) {
  setSpeaking(false);
  if (step.pause > 0) {
    const start = Date.now();
    const tick = () => {
      const el = Date.now()-start;
      document.getElementById("timer-bar").style.width = Math.max(0,100-(el/step.pause)*100)+"%";
      if (el < step.pause) timerRAF = requestAnimationFrame(tick);
      else speakStep(idx+1);
    };
    timerRAF = requestAnimationFrame(tick);
  } else { showScreen("done"); }
}

function speakStep(idx) {
  if (idx >= script.length) { showScreen("done"); return; }
  stepIdx = idx; updateDots();
  const step = script[idx];
  document.getElementById("step-label").textContent = STEP_LABELS[step.id]||"";
  const box = document.getElementById("narration-text");
  box.style.animation = "none";
  box.textContent = `"${step.text}"`;
  void box.offsetWidth;
  box.style.animation = "fadeIn 0.6s ease forwards";
  document.getElementById("next-btn").textContent = idx < script.length-1 ? "Next →" : "Finish";
  document.getElementById("timer-bar").style.width = "100%";
  setSpeaking(false);

  const preset = VOICE_PRESETS.find(p => p.id === selectedVoiceId) || VOICE_PRESETS[0];

  if (true) {
    if (!synth) { document.getElementById("voice-error-msg").classList.remove("hidden"); return; }
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(step.text);
    utt.rate = preset.rate; utt.pitch = preset.pitch; utt.volume = 1;
    const v = getBestVoice(preset);
    if (v) utt.voice = v;
    utt.onstart = () => setSpeaking(true);
    utt.onerror = () => { setSpeaking(false); document.getElementById("voice-error-msg").classList.remove("hidden"); };
    utt.onend = () => afterSpoken(step, idx);
    synth.speak(utt);
  }
}

function setSpeaking(val) { document.getElementById("speaking-indicator").classList.toggle("active", val); }
function cancelCurrent() { synth&&synth.cancel(); if(currentAudio){currentAudio.pause();currentAudio=null;} cancelAnimationFrame(timerRAF); setSpeaking(false); }
function skipStep()   { cancelCurrent(); speakStep(stepIdx+1); }
function replayStep() { cancelCurrent(); speakStep(stepIdx); }
function restart()    { cancelCurrent(); showScreen("players"); }

if (synth) { synth.onvoiceschanged = loadVoices; loadVoices(); }
</script>
</body>
</html>
